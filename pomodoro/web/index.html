<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro</title>
<style>
:root {
  --blue: #5BA4F5;
  --blue-dim: rgba(91,164,245,0.15);
  --blue-hover: #4A93E4;
  --green: #63D165;
  --green-dim: rgba(99,209,101,0.15);
  --red: #FF6961;
  --bg: #1C1C1E;
  --card: #2C2C2E;
  --card-elevated: #3A3A3C;
  --text: #F2F2F7;
  --text-secondary: #8E8E93;
  --text-tertiary: #48484A;
  --border: #38383A;
  --shadow: 0 1px 4px rgba(0,0,0,0.3);
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  overflow-x: hidden;
}

.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 20px 16px;
}

/* Timer Section */
.timer-section {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 32px 24px 24px;
  text-align: center;
  margin-bottom: 12px;
}

.timer-ring-container {
  position: relative;
  width: 200px;
  height: 200px;
  margin: 0 auto 16px;
}

.timer-ring { width: 200px; height: 200px; }

.timer-ring-bg {
  fill: none;
  stroke: var(--border);
  stroke-width: 5;
}

.timer-ring-progress {
  fill: none;
  stroke: var(--blue);
  stroke-width: 5;
  stroke-linecap: round;
  stroke-dasharray: 565.48;
  stroke-dashoffset: 0;
  transform: rotate(-90deg);
  transform-origin: center;
  transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
}

.timer-ring-progress.break { stroke: var(--green); }
.timer-ring-progress.paused { stroke: var(--text-tertiary); }

.timer-display {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.timer-time {
  font-size: 48px;
  font-weight: 200;
  letter-spacing: -1px;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}

.timer-label {
  font-size: 12px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.current-task-name {
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 4px;
  min-height: 24px;
}

.current-task-project {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 20px;
  min-height: 18px;
}

/* Buttons */
.button-row { display: flex; gap: 10px; justify-content: center; }

.btn {
  border: none;
  border-radius: var(--radius-sm);
  padding: 10px 28px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  font-family: inherit;
}

.btn-primary { background: var(--blue); color: #000; }
.btn-primary:hover { background: var(--blue-hover); }
.btn-primary:active { transform: scale(0.97); }

.btn-primary.break-btn { background: var(--green); }
.btn-primary.break-btn:hover { background: #52C054; }

.btn-secondary { background: var(--card-elevated); color: var(--text-secondary); }
.btn-secondary:hover { background: var(--border); }

.btn-danger { background: none; color: var(--text-tertiary); padding: 10px 16px; }
.btn-danger:hover { color: var(--red); }

/* Session Dots */
.session-dots { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }

.session-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text-tertiary);
  transition: background 0.3s ease;
}
.session-dot.filled { background: var(--blue); }

/* Task Selector */
.task-section {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  overflow: hidden;
}

.section-header {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 14px 16px 8px;
}

.task-list { max-height: 320px; overflow-y: auto; }

/* Area dividers */
.area-divider {
  padding: 10px 16px 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-top: 0.5px solid var(--border);
}

.area-divider:first-child { border-top: none; }

.task-item {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  cursor: pointer;
  transition: background 0.1s ease;
  gap: 12px;
}

.task-item:hover { background: var(--card-elevated); }
.task-item.selected { background: var(--blue-dim); }

.task-radio {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid var(--text-tertiary);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s ease;
}

.task-item.selected .task-radio {
  border-color: var(--blue);
  background: var(--blue);
}

.task-item.selected .task-radio::after {
  content: ''; width: 6px; height: 6px;
  border-radius: 50%; background: #000;
}

/* Project-type items in the list */
.task-item.is-project .task-radio {
  border-radius: 4px;
}
.task-item.is-project.selected .task-radio {
  border-radius: 4px;
}
.task-item.is-project.selected .task-radio::after {
  border-radius: 2px;
}

.task-info { flex: 1; min-width: 0; }

.task-title {
  font-size: 14px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.task-project {
  font-size: 12px;
  color: var(--text-secondary);
}

.task-link {
  color: var(--text-tertiary);
  text-decoration: none;
  font-size: 14px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.15s ease;
}

.task-item:hover .task-link { opacity: 1; }

/* Custom Input */
.custom-input-row {
  display: flex; align-items: center;
  padding: 10px 16px; gap: 12px;
  border-top: 0.5px solid var(--border);
}

.custom-input {
  flex: 1; border: none; outline: none;
  font-size: 14px; font-family: inherit;
  color: var(--text); background: transparent;
}
.custom-input::placeholder { color: var(--text-tertiary); }

/* Notes Input */
.notes-section {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px;
  margin-bottom: 12px;
  display: none;
}
.notes-section.visible { display: block; }

.notes-textarea {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 14px; font-family: inherit;
  color: var(--text);
  background: var(--card-elevated);
  resize: vertical; min-height: 60px;
  outline: none;
  transition: border-color 0.15s ease;
}
.notes-textarea:focus { border-color: var(--blue); }

.notes-actions {
  display: flex; justify-content: flex-end;
  gap: 8px; margin-top: 10px;
}

/* Today's Log */
.log-section {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 20px;
}

.log-item {
  padding: 10px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  border-bottom: 0.5px solid var(--border);
}
.log-item:last-child { border-bottom: none; }

.log-empty {
  padding: 20px 16px;
  text-align: center;
  color: var(--text-tertiary);
  font-size: 13px;
}

/* Duration Selector */
.duration-selector {
  display: flex; gap: 6px;
  justify-content: center;
  margin-bottom: 20px;
}

.duration-chip {
  padding: 4px 12px; border-radius: 14px;
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  background: var(--card-elevated);
  color: var(--text-secondary);
  border: none; font-family: inherit;
  transition: all 0.15s ease;
}
.duration-chip.active {
  background: var(--blue-dim);
  color: var(--blue);
}

/* Loading */
.loading { text-align: center; padding: 20px; color: var(--text-tertiary); }

.loading-spinner {
  display: inline-block; width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Scrollbar */
.task-list::-webkit-scrollbar { width: 6px; }
.task-list::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 3px; }
.task-list::-webkit-scrollbar-track { background: transparent; }

/* Stats bar */
.stats-bar {
  display: flex; justify-content: center;
  gap: 24px; padding: 8px 0 0;
}
.stat { text-align: center; }
.stat-value { font-size: 20px; font-weight: 300; color: var(--text); }
.stat-label {
  font-size: 11px; color: var(--text-tertiary);
  text-transform: uppercase; letter-spacing: 0.3px;
}
</style>
</head>
<body>
<div class="container">

  <!-- Timer -->
  <div class="timer-section">
    <div class="timer-ring-container">
      <svg class="timer-ring" viewBox="0 0 200 200">
        <circle class="timer-ring-bg" cx="100" cy="100" r="90"/>
        <circle id="timerProgress" class="timer-ring-progress" cx="100" cy="100" r="90"/>
      </svg>
      <div class="timer-display">
        <div id="timerTime" class="timer-time">25:00</div>
        <div id="timerLabel" class="timer-label">Focus</div>
      </div>
    </div>

    <div id="currentTaskName" class="current-task-name">Select a task</div>
    <div id="currentTaskProject" class="current-task-project"></div>

    <div class="duration-selector">
      <button class="duration-chip" data-minutes="15">15m</button>
      <button class="duration-chip" data-minutes="20">20m</button>
      <button class="duration-chip active" data-minutes="25">25m</button>
      <button class="duration-chip" data-minutes="50">50m</button>
    </div>

    <div id="buttonRow" class="button-row">
      <button id="btnStart" class="btn btn-primary" onclick="startTimer()">Start</button>
    </div>

    <div class="session-dots" id="sessionDots"></div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="statSessions">0</div>
        <div class="stat-label">Sessions</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statMinutes">0</div>
        <div class="stat-label">Minutes</div>
      </div>
    </div>
  </div>

  <!-- Post-session Notes -->
  <div class="notes-section" id="notesSection">
    <div class="section-header">What did you accomplish?</div>
    <textarea class="notes-textarea" id="notesInput" placeholder="Optional notes about this session..."></textarea>
    <div class="notes-actions">
      <button class="btn btn-secondary" onclick="skipLog()">Skip</button>
      <button class="btn btn-primary" onclick="saveLog()">Log Session</button>
    </div>
  </div>

  <!-- Task Selector -->
  <div class="task-section" id="taskSection">
    <div class="section-header">Today</div>
    <div id="taskList" class="task-list">
      <div class="loading"><div class="loading-spinner"></div></div>
    </div>
    <div class="custom-input-row">
      <div class="task-radio" id="customRadio"></div>
      <input class="custom-input" id="customInput"
             placeholder="Or type a custom task..."
             onfocus="selectCustom()" oninput="selectCustom()">
    </div>
  </div>

  <!-- Today's Log -->
  <div class="log-section" id="logSection">
    <div class="section-header">Today's Sessions</div>
    <div id="logList">
      <div class="log-empty">No sessions logged yet</div>
    </div>
  </div>

</div>

<script>
// ── State ──
let state = 'idle';
let timerSeconds = 25 * 60;
let totalSeconds = 25 * 60;
let durationMinutes = 25;
let interval = null;
let sessionsCompleted = 0;
let totalMinutes = 0;
let selectedTask = null;
let isCustomTask = false;
let tasks = [];
let currentSessionId = null;

// ── Elements ──
const $time = document.getElementById('timerTime');
const $label = document.getElementById('timerLabel');
const $progress = document.getElementById('timerProgress');
const $taskName = document.getElementById('currentTaskName');
const $taskProject = document.getElementById('currentTaskProject');
const $buttons = document.getElementById('buttonRow');
const $dots = document.getElementById('sessionDots');
const $taskList = document.getElementById('taskList');
const $customInput = document.getElementById('customInput');
const $customRadio = document.getElementById('customRadio');
const $notes = document.getElementById('notesSection');
const $notesInput = document.getElementById('notesInput');
const $logList = document.getElementById('logList');
const $statSessions = document.getElementById('statSessions');
const $statMinutes = document.getElementById('statMinutes');

const CIRCUMFERENCE = 2 * Math.PI * 90;

// ── Init ──
window.addEventListener('pywebviewready', init);
if (!window.pywebview) setTimeout(() => { if (!window.pywebview) init(); }, 500);

async function init() {
  loadTasks();
  loadLog();
  updateDots();

  document.querySelectorAll('.duration-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      if (state !== 'idle') return;
      document.querySelectorAll('.duration-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      durationMinutes = parseInt(chip.dataset.minutes);
      totalSeconds = durationMinutes * 60;
      timerSeconds = totalSeconds;
      updateTimerDisplay();
    });
  });
}

// ── Tasks ──
async function loadTasks() {
  try {
    const api = window.pywebview && window.pywebview.api;
    if (!api) {
      $taskList.innerHTML = '<div class="log-empty">Connect to Things 3...</div>';
      return;
    }
    const result = await api.get_today_tasks();
    if (result.error) {
      $taskList.innerHTML = `<div class="log-empty">${result.error}</div>`;
      return;
    }
    tasks = result;
    renderTasks();
  } catch (e) {
    $taskList.innerHTML = `<div class="log-empty">Could not load tasks</div>`;
  }
}

function renderTasks() {
  if (!tasks.length) {
    $taskList.innerHTML = '<div class="log-empty">No tasks in Today</div>';
    return;
  }
  let html = '';
  for (let i = 0; i < tasks.length; i++) {
    const t = tasks[i];
    const sel = selectedTask && selectedTask.id === t.id;

    // Area divider
    if (t.show_area) {
      html += `<div class="area-divider">${esc(t.area || 'No Area')}</div>`;
    }

    html += `<div class="task-item${sel ? ' selected' : ''}${t.is_project ? ' is-project' : ''}"
                  onclick="selectTask(${i})">
      <div class="task-radio"></div>
      <div class="task-info">
        <div class="task-title">${esc(t.title)}</div>
        ${t.project ? `<div class="task-project">${esc(t.project)}</div>` : ''}
      </div>
      ${t.obsidian_link ? '<span class="task-link" title="Open in Obsidian">&#x1F517;</span>' : ''}
    </div>`;
  }
  $taskList.innerHTML = html;
}

function selectTask(index) {
  isCustomTask = false;
  selectedTask = tasks[index];
  $customRadio.className = 'task-radio';
  $customRadio.style.cssText = '';
  $customRadio.innerHTML = '';
  $customInput.value = '';
  $taskName.textContent = selectedTask.title;
  $taskProject.textContent = selectedTask.project || '';
  renderTasks();
}

function selectCustom() {
  isCustomTask = true;
  selectedTask = null;
  $customRadio.style.borderColor = 'var(--blue)';
  $customRadio.style.background = 'var(--blue)';
  $customRadio.innerHTML = '<span style="width:6px;height:6px;border-radius:50%;background:#000;display:block"></span>';
  $taskName.textContent = $customInput.value || 'Custom task';
  $taskProject.textContent = '';
  document.querySelectorAll('.task-item').forEach(el => el.classList.remove('selected'));
}

// ── Timer ──
async function startTimer() {
  const taskTitle = getTaskTitle();
  if (!taskTitle) {
    $taskName.textContent = 'Select a task first';
    $taskName.style.color = 'var(--red)';
    setTimeout(() => { $taskName.style.color = ''; }, 1500);
    return;
  }
  const api = window.pywebview && window.pywebview.api;
  if (api) {
    const link = selectedTask ? selectedTask.obsidian_link : null;
    const result = await api.start_session(taskTitle, durationMinutes, link);
    currentSessionId = result && result.session_id;
    loadLog();
  }
  state = 'running';
  timerSeconds = totalSeconds;
  $label.textContent = 'Focus';
  $progress.classList.remove('break', 'paused');
  updateButtons();
  tick();
  interval = setInterval(tick, 1000);
}

function startBreak() {
  const isLong = sessionsCompleted % 4 === 0 && sessionsCompleted > 0;
  state = 'break';
  totalSeconds = isLong ? 15 * 60 : 5 * 60;
  timerSeconds = totalSeconds;
  $label.textContent = isLong ? 'Long Break' : 'Break';
  $progress.classList.add('break');
  $progress.classList.remove('paused');
  updateButtons();
  tick();
  interval = setInterval(tick, 1000);
}

function pauseTimer() {
  clearInterval(interval);
  interval = null;
  state = 'paused';
  $progress.classList.add('paused');
  updateButtons();
}

function resumeTimer() {
  state = state === 'break' ? 'break' : 'running';
  $progress.classList.remove('paused');
  updateButtons();
  interval = setInterval(tick, 1000);
}

function stopTimer() {
  if ((state === 'running' || state === 'paused') && currentSessionId) {
    const api = window.pywebview && window.pywebview.api;
    const id = currentSessionId;
    if (api) api.delete_session(id).then(() => loadLog());
    currentSessionId = null;
  }
  clearInterval(interval);
  interval = null;
  state = 'idle';
  timerSeconds = durationMinutes * 60;
  totalSeconds = durationMinutes * 60;
  $progress.classList.remove('break', 'paused');
  updateTimerDisplay();
  updateButtons();
  $label.textContent = 'Focus';
}

function tick() {
  timerSeconds--;
  updateTimerDisplay();
  if (timerSeconds <= 0) {
    clearInterval(interval);
    interval = null;
    onTimerComplete();
  }
}

function onTimerComplete() {
  const wasBreak = state === 'break';
  const api = window.pywebview && window.pywebview.api;

  if (wasBreak) {
    if (api) api.notify("Break's over! Ready to focus?", true);
    state = 'idle';
    timerSeconds = durationMinutes * 60;
    totalSeconds = durationMinutes * 60;
    $label.textContent = 'Focus';
    $progress.classList.remove('break');
    updateTimerDisplay();
    updateButtons();
  } else {
    if (api) api.notify('Pomodoro complete! Time for a break.', false);
    sessionsCompleted++;
    totalMinutes += durationMinutes;
    $statSessions.textContent = sessionsCompleted;
    $statMinutes.textContent = totalMinutes;
    updateDots();
    state = 'logging';
    $label.textContent = 'Done!';
    showNotesPrompt();
  }
}

function updateTimerDisplay() {
  const mins = Math.floor(timerSeconds / 60);
  const secs = timerSeconds % 60;
  $time.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
  const progress = 1 - (timerSeconds / totalSeconds);
  $progress.style.strokeDashoffset = CIRCUMFERENCE * progress;
}

function updateButtons() {
  switch (state) {
    case 'idle':
      $buttons.innerHTML = `<button class="btn btn-primary" onclick="startTimer()">Start</button>`;
      break;
    case 'running':
      $buttons.innerHTML = `
        <button class="btn btn-secondary" onclick="pauseTimer()">Pause</button>
        <button class="btn btn-danger" onclick="stopTimer()">Stop</button>`;
      break;
    case 'paused':
      $buttons.innerHTML = `
        <button class="btn btn-primary" onclick="resumeTimer()">Resume</button>
        <button class="btn btn-danger" onclick="stopTimer()">Stop</button>`;
      break;
    case 'break':
      $buttons.innerHTML = `
        <button class="btn btn-secondary" onclick="pauseTimer()">Pause</button>
        <button class="btn btn-danger" onclick="stopTimer()">Skip</button>`;
      break;
    case 'logging':
      $buttons.innerHTML = `
        <button class="btn btn-primary break-btn" onclick="startBreak()">Take Break</button>
        <button class="btn btn-secondary" onclick="stopTimer()">Done</button>`;
      break;
  }
}

function updateDots() {
  let html = '';
  for (let i = 0; i < Math.max(4, sessionsCompleted + 1); i++) {
    html += `<div class="session-dot${i < sessionsCompleted ? ' filled' : ''}"></div>`;
  }
  $dots.innerHTML = html;
}

// ── Logging ──
function showNotesPrompt() {
  $notes.classList.add('visible');
  $notesInput.value = '';
  $notesInput.focus();
  updateButtons();
}

async function saveLog() {
  const api = window.pywebview && window.pywebview.api;
  const notes = $notesInput.value;
  if (api && currentSessionId) await api.update_session(currentSessionId, notes);
  currentSessionId = null;
  $notes.classList.remove('visible');
  loadLog();
}

function skipLog() { saveLog(); }

async function loadLog() {
  try {
    const api = window.pywebview && window.pywebview.api;
    if (!api) return;
    const sessions = await api.get_today_sessions();
    if (!sessions || !sessions.length) {
      $logList.innerHTML = '<div class="log-empty">No sessions logged yet</div>';
      return;
    }
    $logList.innerHTML = sessions.map(s =>
      `<div class="log-item">${esc(s)}</div>`
    ).join('');
    $statSessions.textContent = Math.max(sessionsCompleted, sessions.length);
  } catch (e) {}
}

// ── Helpers ──
function getTaskTitle() {
  if (isCustomTask) return $customInput.value.trim();
  if (selectedTask) return selectedTask.title;
  return '';
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
</script>
</body>
</html>
